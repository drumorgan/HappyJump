<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Jump — Admin</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/admin.css" />
</head>
<body>
  <div class="container admin-container">

    <!-- Login form -->
    <section id="login-section">
      <header class="site-header">
        <h1>Happy Jump</h1>
        <p class="tagline">Admin Dashboard</p>
      </header>
      <div class="card">
        <div class="card-header"><span>Login</span></div>
        <div class="card-body">
          <form id="login-form">
            <input type="email" id="login-email" placeholder="Email" required />
            <input type="password" id="login-password" placeholder="Password" required />
            <button type="submit" id="login-btn">Sign In</button>
          </form>
        </div>
      </div>
    </section>

    <!-- Dashboard (hidden until login) -->
    <section id="dashboard" class="hidden">
      <header class="admin-header">
        <h1>Happy Jump <span class="admin-label">Admin</span></h1>
        <button id="logout-btn" class="back-button">Logout</button>
      </header>

      <!-- Stats bar -->
      <div class="stats-bar" id="stats-bar">
        <div class="stat-card">
          <div class="stat-value" id="stat-active">—</div>
          <div class="stat-label">Active</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-clean">—</div>
          <div class="stat-label">Clean Closes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-xan-od">—</div>
          <div class="stat-label">Xanax ODs</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-ecs-od">—</div>
          <div class="stat-label">Ecstasy ODs</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-revenue">—</div>
          <div class="stat-label">Revenue</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-paid">—</div>
          <div class="stat-label">Paid Out</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-net">—</div>
          <div class="stat-label">Net Profit</div>
        </div>
      </div>

      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="transactions">Transactions</button>
        <button class="tab-btn" data-tab="clients">Clients</button>
      </div>

      <!-- Transactions tab -->
      <div id="tab-transactions" class="tab-content active">
        <!-- Transaction filters -->
        <div class="filter-bar">
          <label>Filter:</label>
          <select id="status-filter">
            <option value="all">All</option>
            <option value="requested">Requested</option>
            <option value="purchased">Purchased</option>
            <option value="closed_clean">Clean Closes</option>
            <option value="od_xanax">Xanax OD</option>
            <option value="od_ecstasy">Ecstasy OD</option>
            <option value="payout_sent">Payout Sent</option>
          </select>
          <button id="refresh-btn" class="refresh-btn">Refresh</button>
        </div>

        <!-- Transactions list -->
        <div id="txn-list"></div>
      </div>

      <!-- Clients tab -->
      <div id="tab-clients" class="tab-content">
        <div class="filter-bar">
          <label>Filter:</label>
          <select id="client-tier-filter">
            <option value="all">All Tiers</option>
            <option value="legend">Highway Legend</option>
            <option value="road">Road Warrior</option>
            <option value="safe">Safe Driver</option>
            <option value="new">New Client</option>
          </select>
          <label class="blocked-filter-label">
            <input type="checkbox" id="client-blocked-filter" />
            Blocked only
          </label>
          <button id="refresh-clients-btn" class="refresh-btn">Refresh</button>
        </div>
        <div id="client-list"></div>
      </div>

      <!-- Config panel -->
      <div class="card" style="margin-top:1.5rem">
        <div class="card-header" id="config-header">
          <span>Configuration</span>
          <span class="toggle">▸ show</span>
        </div>
        <div class="card-body collapsed" id="config-body">
          <form id="config-form">
            <!-- Item Prices -->
            <div class="config-section-label">Item Prices
              <span class="config-section-hint">
                <input type="text" id="cfg-api-key" placeholder="Torn API key" class="api-key-input" />
                <button type="button" id="fetch-prices-btn" class="btn-fetch-prices">Fetch Live Prices</button>
              </span>
            </div>
            <div class="config-grid">
              <div class="config-field">
                <label>Xanax Price</label>
                <input type="text" id="cfg-xanax-price" inputmode="numeric" />
              </div>
              <div class="config-field">
                <label>EDVD Price</label>
                <input type="text" id="cfg-edvd-price" inputmode="numeric" />
              </div>
              <div class="config-field">
                <label>Ecstasy Price</label>
                <input type="text" id="cfg-ecstasy-price" inputmode="numeric" />
              </div>
            </div>

            <!-- OD Rates & Rehab -->
            <div class="config-section-label">OD Rates &amp; Rehab</div>
            <div class="config-grid">
              <div class="config-field">
                <label>Xanax OD %</label>
                <input type="number" id="cfg-xanax-od" step="0.01" />
              </div>
              <div class="config-field">
                <label>Ecstasy OD %</label>
                <input type="number" id="cfg-ecstasy-od" step="0.01" />
              </div>
              <div class="config-field">
                <label>Rehab Bonus</label>
                <input type="text" id="cfg-rehab" inputmode="numeric" />
              </div>
            </div>

            <!-- Tier Margins -->
            <div class="config-section-label">Tier Margins</div>
            <div class="config-grid">
              <div class="config-field">
                <label>New Client (0 clean)</label>
                <input type="number" id="cfg-margin-new" step="0.01" placeholder="e.g. 0.18" />
              </div>
              <div class="config-field">
                <label>Safe Driver (1+ clean)</label>
                <input type="number" id="cfg-margin-safe" step="0.01" placeholder="e.g. 0.15" />
              </div>
              <div class="config-field">
                <label>Road Warrior (3+ clean)</label>
                <input type="number" id="cfg-margin-road" step="0.01" placeholder="e.g. 0.12" />
              </div>
              <div class="config-field">
                <label>Highway Legend (5+ clean)</label>
                <input type="number" id="cfg-margin-legend" step="0.01" placeholder="e.g. 0.10" />
              </div>
            </div>

            <!-- Reserve -->
            <div class="config-section-label">Reserve</div>
            <div class="config-grid">
              <div class="config-field">
                <label>Current Reserve</label>
                <input type="text" id="cfg-reserve" inputmode="numeric" />
              </div>
            </div>

            <button type="submit" id="config-save-btn">Save Config</button>
            <span id="config-status" class="config-status"></span>
          </form>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="/src/admin.js"></script>
</body>
</html>
